<h1>JavaScript 기초</h1>

<h2>JavaScript 기초 문법</h1>

<h3>1. 변수 선언</h3><xmp>
let name = "홍길동";
const age = 20;
</xmp><br><br>

<h3>2. 출력</h3><xmp>
console.log(name);
</xmp><br><br>

<h3>3. 조건문</h3><xmp>
if(age >= 20){
    console.log("성인");
}
</xmp><br><br>

<h3>4. 반복문</h3><xmp>
for(let i = 1; i <= 5; i++){
    console.log(i);
}
</xmp><br><br>
